<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mosaico Copacabana</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#7a0c1c;
color:white;
scroll-behavior:smooth;
}

/* MENU TRANSPARENTE */

.menu{
position:fixed;
top:0;
width:100%;
padding:15px;
text-align:center;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(6px);
z-index:1000;
}

.menu a{
color:white;
margin:15px;
text-decoration:none;
font-weight:600;
}

/* TOPO */

.topo{
padding-top:120px;
padding-bottom:60px;
text-align:center;
}

.logo{
width:180px;
}

/* BLOCO COWORKING */

.bloco{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:40px;
justify-content:center;
align-items:center;
}

/* FOTO GRANDE */

.fotoEntrada{
width:450px;
max-width:100%;
border-radius:12px;
}

/* MAPA */

.mapa{
width:450px;
max-width:100%;
border-radius:12px;
overflow:hidden;
}

/* TEXTO */

.texto{
max-width:400px;
}

/* SALAS */

.salas{
padding:40px;
text-align:center;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.galeria img{
width:320px;
border-radius:12px;
transition:0.3s;
}

.galeria img:hover{
transform:scale(1.05);
}

/* CONTATO */

.contato{
text-align:center;
padding:30px;
}

.botoes{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.botao{
background:white;
color:#7a0c1c;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}

/* WHATS */

.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
color:white;
padding:15px;
border-radius:50%;
text-decoration:none;
font-size:20px;
}

/* RESPONSIVO */

@media(max-width:900px){

.bloco{
flex-direction:column;
}

.fotoEntrada,
.mapa{
width:100%;
}

}

</style>

</head>
<body>


<div class="menu">

<a href="#salas">Salas</a>
<a href="#contato">Contato</a>

</div>



<div class="topo">

<img src="logo.png" class="logo">

<h1>Mosaico</h1>

<p>
Espaço para cursos, reuniões e cozinha profissional
</p>

</div>



<!-- BLOCO COM FOTO + MAPA -->

<div class="bloco">

<img src="entrada_predio.jpg" class="fotoEntrada">

<div class="mapa">

<iframe
src="https://www.google.com/maps?q=Rua%20Nossa%20Senhora%20de%20Copacabana%20690&output=embed"
width="100%"
height="300"
style="border:0"
loading="lazy">
</iframe>

</div>

</div>



<!-- SALAS -->

<div class="salas" id="salas">

<h2>Salas</h2>

<p>
Salas para cursos com capacidade de 10 a 15 pessoas
</p>

<div class="galeria">

<img src="sala1.jpg">
<img src="sala2.jpg">
<img src="sala3.jpg">

</div>

</div>



<!-- CONTATO EMBAIXO -->

<div class="contato" id="contato">

<h2>Contato</h2>

<p>
Nossa Senhora de Copacabana 690, cobertura
</p>

<div class="botoes">

<a class="botao" href="https://wa.me/5521999999999">
WhatsApp
</a>

<a class="botao" href="https://instagram.com/SEUINSTAGRAM">
Instagram
</a>

</div>

</div>



<a class="whats" href="https://wa.me/5521999999999">
W
</a>


</body>
</html>
