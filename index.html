<!DOCTYPE html>
<html lang="pt-BR">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Mosaico Copacabana</title>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600&display=swap" rel="stylesheet">

<style>

body{
margin:0;
font-family:Poppins;
background:#7a0c1c;
color:white;
scroll-behavior:smooth;
}


/* MENU */

.menu{
position:fixed;
top:0;
width:100%;
padding:15px;
text-align:center;
background:rgba(0,0,0,0.3);
backdrop-filter:blur(6px);
z-index:1000;
}

.menu a{
color:white;
margin:15px;
text-decoration:none;
font-weight:600;
}


/* TOPO */

.topo{
padding-top:120px;
padding-bottom:20px;
text-align:center;
}

.logo{
width:180px;
}


/* BANNER */

.banner{
display:flex;
justify-content:center;
margin-top:20px;
}

.banner img{
width:90%;
max-width:900px;
border-radius:12px;
}


/* SALAS */

.salas{
padding:40px;
text-align:center;
}

.galeria{
display:flex;
flex-wrap:wrap;
justify-content:center;
gap:20px;
}

.galeria img{
width:320px;
border-radius:12px;
transition:0.3s;
}

.galeria img:hover{
transform:scale(1.05);
}


/* BLOCO ENTRADA + MAPA */

.bloco{
display:flex;
flex-wrap:wrap;
gap:30px;
padding:40px;
justify-content:center;
align-items:center;
}

.fotoEntrada{
width:450px;
max-width:100%;
border-radius:12px;
}

.mapa{
width:450px;
max-width:100%;
border-radius:12px;
overflow:hidden;
}


/* CONTATO */

.contato{
text-align:center;
padding:40px;
}

.botoes{
display:flex;
justify-content:center;
gap:20px;
margin-top:20px;
}

.botao{
background:white;
color:#7a0c1c;
padding:12px 25px;
border-radius:8px;
text-decoration:none;
font-weight:600;
}


/* WHATS */

.whats{
position:fixed;
bottom:20px;
right:20px;
background:#25d366;
width:60px;
height:60px;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 4px 10px rgba(0,0,0,0.3);
}

.whats img{
width:30px;
}


/* RESPONSIVO */

@media(max-width:900px){

.bloco{
flex-direction:column;
}

.fotoEntrada,
.mapa{
width:100%;
}

.galeria img{
width:90%;
}

}

</style>

</head>
<body>
